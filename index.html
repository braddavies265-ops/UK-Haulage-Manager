<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>UK Haulage Manager</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:15px;
-webkit-text-size-adjust:100%;
}

.card{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
}

button{
padding:14px;
margin:6px;
border:none;
border-radius:8px;
background:#1f6feb;
color:white;
font-size:16px;
touch-action:manipulation;
-webkit-tap-highlight-color:transparent;
}

h1,h2{
margin-top:0;
}
</style>
</head>

<body>

<div class="card">
<h1>UK Haulage Manager</h1>
<p>Agency Driver Career</p>
</div>

<div class="card">
<h2>Player</h2>
<p id="money">Savings: £5000</p>
<p id="day">Day: 1</p>
<p id="fatigue">Fatigue: 0%</p>
<p id="company">No Company</p>
</div>

<div class="card">
<h2>Agency Jobs</h2>

<button onclick="workShift()">
Tesco RDC Shift (£180)
</button>

<button onclick="workContainer()">
Container Shift (£220)
</button>

<button onclick="restDay()">
Rest Day
</button>

<button onclick="startCompany()">
Start Ltd Company (£1000)
</button>  

</div>

<div class="card">
<h2>Goal</h2>

<p>
Save £25,000 to buy your first truck.
</p>

</div>

<script>

let money = 5000;
let day = 1;
let fatigue = 0;
let companyOwned = false;

function update(){
document.getElementById("money").innerHTML =
"Savings: £" + money;
document.getElementById("fatigue").innerHTML =
"Fatigue: " + fatigue + "%";
document.getElementById("day").innerHTML =
"Day: " + day;
if(companyOwned){
document.getElementById("company").innerHTML =
"Company: Brad Davies Haulage Ltd";
}else{
document.getElementById("company").innerHTML =
"Company: Not Started";
}  

}
function workShift(){

if(fatigue >= 100){
alert("You are too tired. Take a rest day.");
return;
}

money += 180;
day += 1;
fatigue += 10;

update();
}

function workContainer(){

if(fatigue >= 100){
alert("You are too tired. Take a rest day.");
return;
}

money += 220;
day += 1;
fatigue += 15;

update();
}

function restDay(){

fatigue -= 40;

if(fatigue < 0){
  fatigue = 0;
}

day += 1;

update();
}



function startCompany(){

if(companyOwned){
alert("You already own a company.");
return;
}

if(money < 25000){
alert("You need £25,000 savings first.");
return;
}


money -= 1000;

companyOwned = true;

alert("Brad Davies Haulage Ltd has been formed.");

update();

}


  
update();

</script>

</body>
</html>
