<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>UK Haulage Manager</title>

  
<style>
body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:15px;
-webkit-text-size-adjust:100%;
}

.card{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
}

button{
padding:14px;
margin:6px;
border:none;
border-radius:8px;
background:#1f6feb;
color:white;
font-size:16px;
touch-action:manipulation;
-webkit-tap-highlight-color:transparent;
}

h1,h2{
margin-top:0;
}
</style>
</head>

<body>

<div class="card">
<h1>UK Haulage Manager</h1>
<p>Agency Driver Career</p>
</div>

<div class="card">
<h2>Player</h2>
<p id="money">Savings: £5000</p>
<p id="day">Day: 1</p>
<p id="fatigue">Fatigue: 0%</p>
<p id="company">No Company</p>
<p id="truck">Truck: None</p>
<p id="trailer">Trailer: None</p>
<p id="career">Career: Agency Driver</p>  
</div>

<div class="card">
<h2>Agency Jobs</h2>

<button onclick="workShift()">
Tesco RDC Shift (£140)
</button>

<button onclick="workContainer()">
Container Shift (£170)
</button>

<button onclick="restDay()">
Rest Day
</button>

<button onclick="startCompany()">
Start Ltd Company (£1000)
</button>  

</div>

<div class="card">
<h2>Goal</h2>

<p>
Save £25,000 to buy your first truck.
</p>

</div>
<div class="card">
<h2>Haulage Contracts</h2>
</div>
  
<div class="card">
<h2>Truck Dealer</h2>

<button onclick="buyTruck('Scania R460',115000)">
Buy Scania R460 (£115,000)
</button>

<button onclick="buyTruck('Volvo FH460',118000)">
Buy Volvo FH460 (£118,000)
</button>

<button onclick="buyTruck('DAF XF 480',112000)">
Buy DAF XF 480 (£112,000)
</button>

<div class="card">
<h2>Trailer Dealer</h2>

<button onclick="buyTrailer('Curtainsider',8000)">
Buy Curtainsider (£8,000)
</button>

<button onclick="buyTrailer('Skeletal',5000)">
Buy Skeletal (£5,000)
</button>

<button onclick="buyTrailer('Fridge',25000)">
Buy Fridge (£25,000)
</button>

</div>

<button onclick="haulageJob(650)">
Pallet Delivery (£650)
</button>

<button onclick="haulageJob(850)">
RDC Trunk (£850)
</button>

<button onclick="haulageJob(900)">
Container Work (£900)
</button>

</div>
<script>

let money = 5000;
let day = 1;
let fatigue = 0;
let companyOwned = false;
let truckOwned = "None";
let trailerOwned = "None";
let ownerOperator = false;
let year = 1;
let taxIncome = 0;
let nextTaxDay = 30;

function update(){
document.getElementById("money").innerHTML =
"Savings: £" + money;
document.getElementById("fatigue").innerHTML =
"Fatigue: " + fatigue + "%";
document.getElementById("day").innerHTML =
"Day: " + day;
if(companyOwned){
document.getElementById("company").innerHTML =
"Company: Brad Davies Haulage Ltd";
}else{
document.getElementById("company").innerHTML =
"Company: Not Started";
}  
document.getElementById("truck").innerHTML =
"Truck: " + truckOwned;  
if(ownerOperator){
  document.getElementById("career").innerHTML =
  "Career: Owner Operator";
}else{
  document.getElementById("career").innerHTML =
  "Career: Agency Driver";
}

document.getElementById("trailer").innerHTML =
"Trailer: " + trailerOwned;
  
}
function workShift(){

if(fatigue >= 100){
alert("You are too tired. Take a rest day.");
return;
}

money += 140;
taxIncome += 140;
day += 1;
if(day > 365){
  year += 1;
  day = 1;
}
fatigue += 10;

update();
}

function workContainer(){

if(fatigue >= 100){
alert("You are too tired. Take a rest day.");
return;
}

money += 170;
taxIncome += 170;
day += 1;
if(day > 365){
  year += 1;
  day = 1;
}
fatigue += 15;

update();
}

function restDay(){

fatigue -= 40;

if(fatigue < 0){
  fatigue = 0;
}

day += 1;
if(day > 365){
  year += 1;
  day = 1;
}

update();
}



function startCompany(){

if(companyOwned){
alert("You already own a company.");
return;
}

if(money < 25000){
alert("You need £25,000 savings first.");
return;
}


money -= 1000;

companyOwned = true;

alert("Brad Davies Haulage Ltd has been formed.");

update();

}


function buyTruck(name, price){

  if(money < price){
    alert("Not enough money.");
    return;
  }

  money -= price;
  truckOwned = name;
  ownerOperator = true;

  alert("You bought a " + name);

  update();
}
function haulageJob(pay){

  if(!ownerOperator){
    alert("You need your own truck first.");
    return;
  }

  money += pay;
  day += 1;
  if(day > 365){
  year += 1;
  day = 1;
}
  fatigue += 20;

  update();
}
if(day >= nextTaxDay){

    let tax = 0;

    if(taxIncome <= 4500){
        tax = taxIncome * 0.20;
    }else{
        tax = (4500 * 0.20) +
              ((taxIncome - 4500) * 0.40);
    }

    money -= tax;

    alert(
        "HMRC Tax Bill\n\n" +
        "Income: £" + taxIncome +
        "\nTax: £" + tax.toFixed(0)
    );

    taxIncome = 0;
    nextTaxDay += 30;
}
function buyTrailer(name, price){

  if(!ownerOperator){
    alert("You need a truck first.");
    return;
  }

  if(money < price){
    alert("Not enough money.");
    return;
  }

  trailerOwned = name;

  money -= price;

  alert("You bought a " + name + " trailer.");

  update();
}
  
update();

</script>

</body>
</html>
