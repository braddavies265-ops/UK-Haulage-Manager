<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>UK Haulage Manager</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:15px;
-webkit-text-size-adjust:100%;
}

.card{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
}

button{
padding:14px;
margin:6px;
border:none;
border-radius:8px;
background:#1f6feb;
color:white;
font-size:16px;
touch-action:manipulation;
-webkit-tap-highlight-color:transparent;
}

h1,h2{
margin-top:0;
}
</style>
</head>

<body>

<div class="card">
<h1>UK Haulage Manager</h1>
<p>Agency Driver Career</p>
</div>

<div class="card">
<h2>Player</h2>
<p id="money">Savings: £5000</p>
<p id="day">Day: 1</p>
</div>

<div class="card">
<h2>Agency Jobs</h2>

<button onclick="workShift()">
Tesco RDC Shift (£180)
</button>

<button onclick="workContainer()">
Container Shift (£220)
</button>

</div>

<div class="card">
<h2>Goal</h2>

<p>
Save £25,000 to buy your first truck.
</p>

</div>

<script>

let money = 5000;
let day = 1;

function update(){
document.getElementById("money").innerHTML =
"Savings: £" + money;

document.getElementById("day").innerHTML =
"Day: " + day;
}

function workShift(){
money += 180;
day += 1;
update();
}

function workContainer(){
money += 220;
day += 1;
update();
}

update();

</script>

</body>
</html>
